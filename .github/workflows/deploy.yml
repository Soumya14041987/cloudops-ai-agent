name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "tools/**"
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: staging
        type: choice
        options: [staging, prod]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write   # OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Build Lambda package
        run: |
          mkdir -p lambda_package
          pip install -r requirements.txt --target lambda_package/ --quiet
          cp -r agents tools app.py lambda_package/
          cd lambda_package && zip -r ../lambda_package.zip . \
            -x "*.pyc" -x "*/__pycache__/*" -q

      - name: Deploy to Lambda (staging)
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}-staging \
            --zip-file fileb://lambda_package.zip \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}-staging \
            --region ${{ secrets.AWS_REGION }}

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}-staging \
            --environment "Variables={
              AWS_REGION=${{ secrets.AWS_REGION }},
              BEDROCK_MODEL_ID=${{ secrets.BEDROCK_MODEL_ID }},
              AUTO_EXECUTE=false,
              DRY_RUN=true,
              LOG_LEVEL=DEBUG
            }" \
            --region ${{ secrets.AWS_REGION }}

      - name: Smoke-test staging
        run: |
          aws lambda invoke \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}-staging \
            --payload '{"incident_description":"smoke-test","resource_hints":{}}' \
            --region ${{ secrets.AWS_REGION }} \
            /tmp/response.json
          cat /tmp/response.json | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          body = json.loads(r.get('body','{}'))
          status = body.get('status','UNKNOWN')
          print('Status:', status)
          sys.exit(0 if status in ('SUCCESS','ERROR') else 1)
          "

  # ───────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → production
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-staging
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package-${{ github.sha }}
          path: .
        continue-on-error: true

      - name: Build Lambda package (if artifact missing)
        run: |
          if [ ! -f lambda_package.zip ]; then
            mkdir -p lambda_package
            pip install -r requirements.txt --target lambda_package/ --quiet
            cp -r agents tools app.py lambda_package/
            cd lambda_package && zip -r ../lambda_package.zip . \
              -x "*.pyc" -x "*/__pycache__/*" -q
          fi

      - name: Deploy to Lambda (production)
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda_package.zip \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Update Lambda environment variables (prod)
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --environment "Variables={
              AWS_REGION=${{ secrets.AWS_REGION }},
              BEDROCK_MODEL_ID=${{ secrets.BEDROCK_MODEL_ID }},
              AUTO_EXECUTE=false,
              DRY_RUN=true,
              LOG_LEVEL=INFO
            }" \
            --region ${{ secrets.AWS_REGION }}

      - name: Publish Lambda version + update alias
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Version' --output text)
          echo "Published version: $VERSION"
          aws lambda update-alias \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --name live \
            --function-version "$VERSION" \
            --region ${{ secrets.AWS_REGION }} || \
          aws lambda create-alias \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --name live \
            --function-version "$VERSION" \
            --region ${{ secrets.AWS_REGION }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ CloudOps AI Agent deployed to production (commit: ${{ github.sha }})"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ CloudOps AI Agent production deploy FAILED (commit: ${{ github.sha }})"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
