name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff linter
        run: python -m ruff check agents tools app.py tests scripts

      - name: Run ruff formatter check
        run: python -m ruff format --check agents tools app.py tests scripts

  # ───────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: python -m mypy agents tools app.py

  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ -m "not integration" \
            --cov=agents --cov=tools --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  package:
    name: Build Lambda package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Build deployment ZIP
        run: |
          mkdir -p lambda_package
          pip install -r requirements.txt --target lambda_package/ --quiet
          cp -r agents tools app.py lambda_package/
          cd lambda_package && zip -r ../lambda_package.zip . \
            -x "*.pyc" -x "*/__pycache__/*" -q
          echo "Package size: $(du -sh lambda_package.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package-${{ github.sha }}
          path: lambda_package.zip
          retention-days: 7
